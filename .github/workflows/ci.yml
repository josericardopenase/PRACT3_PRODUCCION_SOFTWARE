name: CI

on:
  push:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Ajusta a tu versión de Python

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # Acelera las ejecuciones posteriores

      - name: Install dependencies
        run: uv sync

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff linter
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest tests/unit # O simplemente uv run pytest

      - name: Integration tests
        run: uv run pytest tests/integration

      - name: BDD tests
        run: uv run pytest tests/bdd